<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mailfill Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="options-container">
    <h1>Mailfill Settings</h1>

    <section>
      <h2>Mail Domain</h2>
      <input type="text" id="mail-domain" placeholder="your-domain.com" />
    </section>

    <section>
      <h2>Default Template</h2>
      <input type="text" id="default-template" />
      <div class="preview" id="template-preview"></div>
      <div class="error" id="template-error"></div>
    </section>

    <section>
      <h2>Presets</h2>
      <div id="presets-list"></div>
      <button id="add-preset" class="secondary">Add Preset</button>
    </section>

    <section>
      <h2>Counter</h2>
      <p>Current value: <span id="counter-value"></span></p>
    </section>

    <button id="save">Save Settings</button>
    <div class="status" id="save-status"></div>
  </div>
  <script type="module" src="options.ts"></script>
</body>
</html>

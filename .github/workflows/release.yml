name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Run checks
        run: task check

      - name: Package extensions
        run: task package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/aliaser-*-chrome.zip
            dist/aliaser-*-firefox.xpi
          generate_release_notes: true
